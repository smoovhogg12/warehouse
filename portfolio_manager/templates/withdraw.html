<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw – Token Portfolio Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>🏦 Withdraw Funds</h1>
    <p class="page-subtitle"><a href="/">← Back to Portfolio</a></p>

    <section class="card" id="withdraw-section">
      <h2>Withdraw from Your Portfolio</h2>
      <form id="withdraw-form">
        <div class="form-row">
          <label for="withdraw-amount">Amount</label>
          <input
            type="number"
            id="withdraw-amount"
            placeholder="0.00"
            step="0.01"
            min="0.01"
            required
          />
        </div>
        <div class="form-row">
          <label for="withdraw-currency">Currency</label>
          <select id="withdraw-currency" required>
            <option value="usd">USD – US Dollar</option>
            <option value="eur">EUR – Euro</option>
            <option value="gbp">GBP – British Pound</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" id="withdraw-btn">
          🏦 Request Withdrawal
        </button>
      </form>
      <p id="withdraw-message" class="message"></p>
    </section>

    <section class="card hidden" id="withdraw-result">
      <h2>Withdrawal Initiated</h2>
      <table>
        <tbody id="withdraw-result-body"></tbody>
      </table>
      <p class="message success">
        Your payout has been submitted to Stripe. Funds will arrive in your bank account according to your Stripe payout schedule.
      </p>
    </section>
  </div>

  <script src="/static/js/withdraw.js"></script>
</body>
</html>
